<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi WhatsApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        #chat-window {
            height: 60vh;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            background-color: #ffffff;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .message {
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 75%;
            width: fit-content;
            background-color: #f1f0f0;
            color: #000000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        /* Developer Profile Image Styling Rules */
        .dev-profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #198754;
        }
        
        /* Dark Mode Interface Environment Styling */
        body.dark-mode {
            background-color: #121212 !important;
            color: #ffffff !important;
        }
        body.dark-mode #chat-window {
            background-color: #1e1e1e;
            border-color: #333;
        }
        body.dark-mode .message {
            background-color: #2d2d2d;
            color: #ffffff;
            border: 1px solid #444;
        }
        body.dark-mode .card {
            background-color: #1e1e1e !important;
            border-color: #333;
        }
        body.dark-mode input {
            background-color: #2d2d2d !important;
            color: #ffffff !important;
            border-color: #444;
        }
        body.dark-mode input::placeholder {
            color: #aaa;
        }
        body.dark-mode .text-muted {
            color: #aaa !important;
        }
    </style>
</head>
<body class="bg-body-tertiary">

    <div class="container py-4" style="max-width: 700px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-2">
                <h2 class="m-0"><i class="fab fa-whatsapp text-success me-2"></i>WiFi Chat</h2>
            </div>
            <button id="theme-toggle" class="btn btn-outline-secondary">
                <i id="theme-icon" class="fas fa-moon"></i> <span id="theme-text">Dark Mode</span>
            </button>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" id="username" class="form-control" placeholder="Your Name" value="Anonymous">
        </div>

        <div id="chat-window" class="mb-3"></div>

        <div class="card p-3 shadow-sm mb-3">
            <div class="input-group mb-3">
                <input type="text" id="message-input" class="form-control" placeholder="Type a message...">
                <button id="send-btn" class="btn btn-success"><i class="fas fa-paper-plane"></i></button>
            </div>

            <div class="row g-2">
                <div class="col-9">
                    <input type="file" id="file-input" class="form-control">
                </div>
                <div class="col-3">
                    <button id="upload-btn" class="btn btn-primary w-100"><i class="fas fa-upload"></i> Upload</button>
                </div>
            </div>
        </div>

        <div class="d-flex align-items-center justify-content-center gap-3 mt-4 py-2 border-top">
            <img src="/uploads/your-pic.png" onerror="this.src='https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&h=100&q=80'" class="dev-profile-img" alt="Developer">
            <div class="text-center">
                <small class="text-muted d-block">Developed by</small>
                <strong class="text-success" style="font-size: 1.1rem;">James Chowdhury</strong>
            </div>
        </div>
    </div>

    <script>
        const socket = io({ transports: ['websocket', 'polling'] });
        const chatWindow = document.getElementById('chat-window');

        // Receive standard chat text entries
        socket.on('receive_message', function(data) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = '<strong>' + data.user + ':</strong> ' + data.message;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // Receive files & add download option automatically
        socket.on('receive_file', function(data) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            let assetHTML = '';
            if (data.type === 'picture') {
                assetHTML = '<br><img src="' + data.file_url + '" class="img-fluid rounded mt-2" style="max-height: 200px; border: 1px solid #ddd;">' +
                            '<br><a href="' + data.file_url + '" target="_blank" class="btn btn-sm btn-dark mt-2 text-white" download><i class="fas fa-download"></i> Download Image</a>';
            } else {
                assetHTML = '<br><a href="' + data.file_url + '" target="_blank" class="btn btn-sm btn-primary mt-2 text-white" download><i class="fas fa-download"></i> Open & Download ' + data.filename + '</a>';
            }

            msgDiv.innerHTML = '<strong>' + data.user + ' Shared a file:</strong>' + assetHTML;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const user = document.getElementById('username').value || 'Anonymous';
            const text = document.getElementById('message-input').value.trim();
            if (text !== '') {
                socket.emit('send_message', { user: user, message: text });
                document.getElementById('message-input').value = '';
            }
        }

        // Processing Upload Transmission Pipelines via HTTP POST
        document.getElementById('upload-btn').addEventListener('click', function() {
            const fileInput = document.getElementById('file-input');
            const uploadBtn = document.getElementById('upload-btn');
            const user = document.getElementById('username').value || 'Anonymous';
            
            if (fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('user', user);
            
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>...';

            fetch('/upload', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => { 
                if(data.success) {
                    fileInput.value = ''; 
                } else {
                    alert("Error processing upload pipeline payload structure.");
                }
            })
            .catch(err => console.error("Upload process error caught:", err))
            .finally(() => {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i class="fas fa-upload"></i> Upload';
            });
        });

        // Theme Toggle Functionality Engine
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        themeToggleBtn.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                themeIcon.className = 'fas fa-sun';
                themeText.innerText = 'Light Mode';
            } else {
                themeIcon.className = 'fas fa-moon';
                themeText.innerText = 'Dark Mode';
            }
        });
    </script>
</body>
</html>
