<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cloudx-chat-room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        #chat-window {
            height: 60vh;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            background-color: #ffffff;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .message {
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 75%;
            width: fit-content;
            background-color: #f1f0f0;
            color: #000000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        /* Dark Theme Design Adjustments */
        body.dark-mode {
            background-color: #121212 !important;
            color: #ffffff !important;
        }
        body.dark-mode #chat-window {
            background-color: #1e1e1e;
            border-color: #333;
        }
        body.dark-mode .message {
            background-color: #2d2d2d;
            color: #ffffff;
        }
        body.dark-mode .card {
            background-color: #1e1e1e !important;
            border-color: #333;
        }
        body.dark-mode input {
            background-color: #2d2d2d !important;
            color: #ffffff !important;
            border-color: #444;
        }
        body.dark-mode input::placeholder {
            color: #aaa;
        }
    </style>
</head>
<body class="bg-body-tertiary">

    <div class="container py-4" style="max-width: 700px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0"><i class="fab fa-whatsapp text-success me-2"></i>WiFi Chat</h2>
            <button id="theme-toggle" class="btn btn-outline-secondary">
                <i id="theme-icon" class="fas fa-moon"></i> <span id="theme-text">Dark Mode</span>
            </button>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" id="username" class="form-control" placeholder="Your Name" value="Anonymous">
        </div>

        <div id="chat-window" class="mb-3"></div>

        <div class="card p-3 shadow-sm">
            <div class="input-group mb-3">
                <input type="text" id="message-input" class="form-control" placeholder="Type a message...">
                <button id="send-btn" class="btn btn-success"><i class="fas fa-paper-plane"></i></button>
            </div>

            <div class="row g-2">
                <div class="col-9">
                    <input type="file" id="file-input" class="form-control">
                </div>
                <div class="col-3">
                    <button id="upload-btn" class="btn btn-primary w-100"><i class="fas fa-upload"></i> Upload</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🔌 Connect using explicit fallback transports for Render servers
        const socket = io({ transports: ['websocket', 'polling'] });
        const chatWindow = document.getElementById('chat-window');

        // Receive text messages
        socket.on('receive_message', function(data) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = '<strong>' + data.user + ':</strong> ' + data.msg;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // Receive file payloads
        socket.on('receive_file', function(data) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            let assetHTML = '';
            if (data.type === 'picture') {
                assetHTML = '<br><img src="' + data.file_url + '" class="img-fluid rounded mt-2" style="max-height: 200px;">';
            } else {
                assetHTML = '<br><a href="' + data.file_url + '" target="_blank" class="btn btn-sm btn-info mt-2 text-white"><i class="fas fa-file-download"></i> Open ' + data.filename + '</a>';
            }

            msgDiv.innerHTML = '<strong>' + data.user + ' Shared a file:</strong>' + assetHTML;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // Click Send handlers
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const user = document.getElementById('username').value || 'Anonymous';
            const text = document.getElementById('message-input').value.trim();
            if (text !== '') {
                socket.emit('send_message', { user: user, msg: text });
                document.getElementById('message-input').value = '';
            }
        }

        // File Form submit handler
        document.getElementById('upload-btn').addEventListener('click', function() {
            const fileInput = document.getElementById('file-input');
            const user = document.getElementById('username').value || 'Anonymous';
            if (fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('user', user);
            
            let detectedType = 'file';
            if (file.type.startsWith('image/')) detectedType = 'picture';
            if (file.type.startsWith('audio/')) detectedType = 'audio';
            formData.append('type', detectedType);

            fetch('/upload', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => { if(data.success) fileInput.value = ''; });
        });

        // 🌓 Safe isolated theme engine switcher
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        themeToggleBtn.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                themeIcon.className = 'fas fa-sun';
                themeText.innerText = 'Light Mode';
            } else {
                themeIcon.className = 'fas fa-moon';
                themeText.innerText = 'Dark Mode';
            }
        });
    </script>
</body>
</html>
