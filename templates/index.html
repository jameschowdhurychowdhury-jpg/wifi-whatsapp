<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WhatsApp Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        #chat-window { height: 65vh; overflow-y: auto; background: #efeae2; border-radius: 8px; }
        .msg-box { margin-bottom: 12px; padding: 10px 14px; border-radius: 10px; max-width: 80%; width: fit-content; }
        .msg-layout { background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .media-preview { max-height: 250px; cursor: pointer; display: block; border-radius: 6px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-3" style="max-width: 700px;">
    <div class="card shadow">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h6 class="mb-0">🟢 Local Wi-Fi Chat Room</h6>
            <input type="text" id="username" class="form-control form-control-sm w-25" value="Device User">
        </div>
        
        <div id="chat-window" class="card-body p-3 d-flex flex-column"></div>

        <div class="card-footer bg-white">
            <div class="input-group mb-2">
                <input type="text" id="message-input" class="form-control" placeholder="Type a message...">
                <button class="btn btn-success" id="send-btn">Send</button>
            </div>
            
            <div class="d-flex flex-wrap gap-2">
                <input type="file" id="file-input" style="display:none;">
                <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none;">
                
                <button class="btn btn-sm btn-outline-secondary" onclick="startUpload('image')">🖼️ Photo</button>
                <button class="btn btn-sm btn-outline-secondary" onclick="startUpload('audio')">🎵 Audio</button>
                <button class="btn btn-sm btn-outline-secondary" onclick="startUpload('file')">📂 Document</button>
                <button class="btn btn-sm btn-outline-warning" onclick="startFolderUpload()">📁 Entire Folder</button>
            </div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const chatWindow = document.getElementById('chat-window');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const usernameInput = document.getElementById('username');
    const fileInput = document.getElementById('file-input');
    const folderInput = document.getElementById('folder-input');
    let uploadType = 'file';

    // Handle Text Sending
    sendBtn.addEventListener('click', () => {
        const msg = messageInput.value.trim();
        const user = usernameInput.value.trim();
        if(msg) {
            socket.emit('send_message', { user: user, msg: msg });
            messageInput.value = '';
        }
    });
    messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendBtn.click(); });

    socket.on('receive_message', (data) => {
        showBubble(`<strong>${data.user}:</strong> ${data.msg}`);
    });

    // Handle Single File Selections
    function startUpload(type) {
        uploadType = type;
        fileInput.click();
    }

    fileInput.addEventListener('change', () => {
        if(!fileInput.files.length) return;
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('user', usernameInput.value.trim());
        formData.append('type', uploadType);

        fetch('/upload', { method: 'POST', body: formData })
        .then(() => { fileInput.value = ''; });
    });

    // Handle Folder Selections
    function startFolderUpload() {
        folderInput.click();
    }

    folderInput.addEventListener('change', () => {
        const files = folderInput.files;
        if (!files.length) return;

        // Loop through and send every file inside the selected folder
        for (let i = 0; i < files.length; i++) {
            const formData = new FormData();
            formData.append('file', files[i]);
            formData.append('user', usernameInput.value.trim());
            
            // Smart type detection based on file extension
            let filename = files[i].name.toLowerCase();
            let type = 'file';
            if (filename.endsWith('.png') || filename.endsWith('.jpg') || filename.endsWith('.jpeg') || filename.endsWith('.gif')) {
                type = 'image';
            } else if (filename.endsWith('.mp3') || filename.endsWith('.wav') || filename.endsWith('.m4a') || filename.endsWith('.ogg')) {
                type = 'audio';
            }
            formData.append('type', type);

            fetch('/upload', { method: 'POST', body: formData })
            .then(() => { 
                if(i === files.length - 1) folderInput.value = ''; 
            });
        }
    });

    // Receive Files & Render Preview + Download Utilities
    socket.on('receive_file', (data) => {
        let body = `<div class="mb-1"><strong>${data.user}</strong> shared an asset:</div>`;
        
        if(data.type === 'image') {
            body += `
                <a href="${data.file_url}" target="_blank">
                    <img src="${data.file_url}" class="img-fluid media-preview border mb-2" title="Click to expand">
                </a>
                <div class="mt-1">
                    <a href="${data.file_url}" download="${data.filename}" class="btn btn-sm btn-primary py-0 px-2 small">📥 Download Photo</a>
                </div>`;
        } else if(data.type === 'audio') {
            body += `
                <audio controls class="w-100 mt-1 mb-2">
                    <source src="${data.file_url}">
                    Your browser does not support audio playback.
                </audio>
                <div>
                    <a href="${data.file_url}" download="${data.filename}" class="btn btn-sm btn-primary py-0 px-2 small">📥 Download Audio</a>
                </div>`;
        } else {
            body += `
                <div class="p-2 border rounded bg-light mb-2 d-flex align-items-center gap-2">
                    <span>📄 ${data.filename}</span>
                </div>
                <div class="d-flex gap-2">
                    <a href="${data.file_url}" target="_blank" class="btn btn-sm btn-outline-success py-0 px-2">👁️ Open File</a>
                    <a href="${data.file_url}" download="${data.filename}" class="btn btn-sm btn-primary py-0 px-2">📥 Download</a>
                </div>`;
        }
        showBubble(body);
    });

    function showBubble(html) {
        const div = document.createElement('div');
        div.className = 'msg-box msg-layout';
        div.innerHTML = html;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>
</body>
</html>
